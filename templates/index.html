<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QuickCart Delivery</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
      .app { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .hero { background: linear-gradient(135deg, #2563eb, #14b8a6); color: white; padding: 24px; border-radius: 18px; }
      .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
      .panel { background: white; border-radius: 16px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      .filters { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
      .filters input, .filters select, .checkout input, .checkout textarea { padding: 10px; border: 1px solid #d1d5db; border-radius: 10px; }
      .product-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .product-card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; }
      .product-card button, .checkout button { background: #2563eb; color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
      .cart-item { display: flex; justify-content: space-between; margin-bottom: 8px; }
      .summary { font-weight: bold; margin-top: 12px; }
      .status { color: #047857; font-weight: bold; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .product-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="hero">
        <h1>QuickCart Delivery</h1>
        <p>Fast, smart, and reliable grocery delivery for your home or office.</p>
        <div class="status">⚡ 18–25 min delivery • Live tracking • Secure checkout</div>
      </div>

      <div class="layout">
        <div class="panel">
          <h2>Browse products</h2>
          <div class="filters">
            <input id="search" placeholder="Search products" />
            <select id="category-filter">
              <option value="All">All categories</option>
            </select>
          </div>
          <div id="product-grid" class="product-grid"></div>
        </div>

        <div class="panel">
          <h2>Your cart</h2>
          <div id="cart-items">Your cart is empty.</div>
          <div class="summary" id="summary">Total: ₹0</div>
          <hr>
          <h3>Checkout</h3>
          <form id="checkout-form" class="checkout">
            <input id="name" placeholder="Your name" required /><br><br>
            <input id="phone" placeholder="Phone number" required /><br><br>
            <textarea id="address" rows="3" placeholder="Delivery address" required></textarea><br><br>
            <button type="submit">Place order</button>
          </form>
          <p id="message" class="status"></p>
        </div>
      </div>
    </div>

    <script>
      let products = [];
      let cart = [];
      let categories = [];

      async function loadProducts() {
        const response = await fetch('/api/products');
        const data = await response.json();
        products = data.products;
        categories = data.categories;
        renderFilters();
        renderProducts();
      }

      function renderFilters() {
        const filter = document.getElementById('category-filter');
        filter.innerHTML = '<option value="All">All categories</option>';
        categories.forEach((category) => {
          const option = document.createElement('option');
          option.value = category;
          option.textContent = category;
          filter.appendChild(option);
        });
      }

      function renderProducts() {
        const search = document.getElementById('search').value.toLowerCase();
        const category = document.getElementById('category-filter').value;
        const filtered = products.filter((product) => {
          const matchText = product.name.toLowerCase().includes(search) || product.desc.toLowerCase().includes(search);
          const matchCategory = category === 'All' || product.category === category;
          return matchText && matchCategory;
        });

        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        filtered.forEach((product) => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            <strong>${product.name}</strong><br>
            <small>${product.category}</small><br>
            <span>${product.desc}</span><br><br>
            <strong>₹${product.price}</strong><br>
            <small>${product.badge}</small><br><br>
            <button onclick="addToCart(${product.id})">Add to cart</button>
          `;
          grid.appendChild(card);
        });
      }

      function addToCart(productId) {
        const existing = cart.find((item) => item.id === productId);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ id: productId, quantity: 1 });
        }
        renderCart();
      }

      function renderCart() {
        const cartItems = document.getElementById('cart-items');
        if (!cart.length) {
          cartItems.innerHTML = 'Your cart is empty.';
          document.getElementById('summary').textContent = 'Total: ₹0';
          return;
        }

        const selected = cart.map((item) => {
          const product = products.find((p) => p.id === item.id);
          return { ...product, quantity: item.quantity };
        });

        cartItems.innerHTML = selected.map((item) => `
          <div class="cart-item">
            <span>${item.name} × ${item.quantity}</span>
            <span>₹${item.price * item.quantity}</span>
          </div>
        `).join('');

        const total = selected.reduce((sum, item) => sum + item.price * item.quantity, 0);
        document.getElementById('summary').textContent = `Total: ₹${total}`;
      }

      document.getElementById('checkout-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!cart.length) {
          document.getElementById('message').textContent = 'Add items before placing the order.';
          return;
        }

        const payload = {
          items: cart.map((item) => ({ id: item.id, quantity: item.quantity })),
          customer: {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
          },
        };

        const response = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        document.getElementById('message').textContent = result.message;
        if (result.ok) {
          cart = [];
          renderCart();
          document.getElementById('checkout-form').reset();
        }
      });

      document.getElementById('search').addEventListener('input', renderProducts);
      document.getElementById('category-filter').addEventListener('change', renderProducts);

      loadProducts();
    </script>
  </body>
</html>
